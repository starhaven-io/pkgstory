name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "site/**"
      - "trigger/**"
      - ".github/workflows/**"

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@756680c5201eb05f361eb29ed1577d5bdffc274c # v2026.07.05
    with:
      languages: '["actions","javascript-typescript"]'
      runner: "ubuntu-24.04"
      timeout-minutes: 30
      build-mode: ""
      build-profile: ""
