name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
  workflow_dispatch:

defaults:
  run:
    # No -x: this job handles secrets; xtrace would echo them into the log.
    shell: bash -euo pipefail {0}

permissions: {}

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-slim
    permissions:
      contents: read # required to checkout repository
    environment: cloudflare
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          package-manager-cache: false

      # No data needed at build time: the site reads D1 + the precomputed KV blobs
      # at runtime, so this deploys code only. Data freshness is the crawl job's job.

      - name: Install dependencies
        working-directory: site
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: site
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
