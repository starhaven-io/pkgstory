name: Crawl

on:
  workflow_dispatch:
  repository_dispatch:
    # Fired by the trigger/ Worker as the starhaven-bot App.
    types: [crawl]
  schedule:
    # Fallback only — the trigger/ Worker drives the real cadence. Offset off the hour.
    - cron: "23 */6 * * *"
  push:
    branches:
      - main
    paths:
      - .github/workflows/crawl.yml

permissions: {}

defaults:
  run:
    # No -x: this job handles secrets; xtrace would echo them into the log.
    shell: bash -euo pipefail {0}

concurrency:
  group: crawl
  cancel-in-progress: false # never interrupt a mid-flight D1 write

jobs:
  crawl:
    name: Crawl deltas into D1
    if: github.repository_owner == 'starhaven-io'
    runs-on: ubuntu-24.04
    environment: cloudflare # holds the Cloudflare token (matches deploy-site)
    permissions:
      actions: write # required to prune old tap caches with gh cache delete
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compute tap cache week
        id: tap-week
        run: echo "week=$(date -u +%G-%V)" >> "${GITHUB_OUTPUT}"

      - name: Restore tap clones
        id: tap-cache
        # setup-homebrew fetches the delta into a pre-existing tap dir and only
        # full-clones when it's absent, so restoring the clones turns ~1-2 min of
        # cloning per run into a few seconds of fetch. The weekly key means one
        # cache save per week (first run after rollover, via restore-keys). Old
        # weekly tap caches are large, so a later step prunes stale keys after
        # the current week is saved or confirmed.
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/linuxbrew/.linuxbrew/Homebrew/Library/Taps/homebrew/homebrew-core
            /home/linuxbrew/.linuxbrew/Homebrew/Library/Taps/homebrew/homebrew-cask
          key: taps-v1-${{ steps.tap-week.outputs.week }}
          restore-keys: taps-v1-

      - name: Set up Homebrew taps
        uses: Homebrew/actions/setup-homebrew@main
        with:
          # Full (non-shallow) tap clones — brew dropped shallow taps — so the crawler's
          # `git log <cursor>..HEAD` always reaches the stored cursor.
          core: true
          cask: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install wrangler
        working-directory: site
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Crawl deltas into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: node src/cli.ts crawl --d1 remote

      - name: Save tap clones
        if: steps.tap-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/linuxbrew/.linuxbrew/Homebrew/Library/Taps/homebrew/homebrew-core
            /home/linuxbrew/.linuxbrew/Homebrew/Library/Taps/homebrew/homebrew-cask
          key: ${{ steps.tap-cache.outputs.cache-primary-key }}

      - name: Prune old tap caches
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURRENT_TAP_CACHE_KEY: taps-v1-${{ steps.tap-week.outputs.week }}
        run: |
          gh cache list \
            --ref refs/heads/main \
            --key taps-v1- \
            --limit 100 \
            --json id,key \
            --jq ".[] | select(.key != \"${CURRENT_TAP_CACHE_KEY}\") | .id" |
            while IFS= read -r cache_id; do
              gh cache delete "${cache_id}" || echo "::warning::failed to delete tap cache ${cache_id}"
            done
