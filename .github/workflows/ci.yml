name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  # PR body/title edits fire `edited` events; give them their own per-run group so
  # they can't cancel in-flight tests from the preceding `opened`/`synchronize` run.
  group: ${{ github.event.action == 'edited' && format('ci-edit-{0}-{1}', github.ref, github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions: {}

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      run_codeql: ${{ steps.matrix.outputs.run_codeql }}
      run_codecov: ${{ steps.matrix.outputs.run_codecov }}
      run_zizmor: ${{ steps.matrix.outputs.run_zizmor }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CI matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push to main: run lint + test to warm caches and guard the branch.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            {
              echo 'matrix=[{"name":"Lint","check":"lint","runner":"ubuntu-24.04"},{"name":"Test","check":"test","runner":"ubuntu-24.04"}]'
              echo "run_codeql=false"
              echo "run_codecov=true"
              echo "run_zizmor=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MATRIX='[]'
          RUN_CODEQL=false
          RUN_CODECOV=false
          RUN_ZIZMOR=false
          add_check() {
            local entry="$1"
            if [[ "${MATRIX}" == "[]" ]]; then
              MATRIX="[${entry}]"
            else
              MATRIX="${MATRIX%]},${entry}]"
            fi
          }

          # `edited` (title/body/base) also runs the full path-derived matrix. The
          # aggregate "conclusion" job is the only required status check, so it must
          # certify every relevant leg for the current commit. Collapsing to a
          # commits-only matrix on `edited` lets a green run overwrite a prior failing
          # one on the same SHA, bypassing tests, site checks and the rest.
          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")

          # Crawler / tooling changes: lint + test
          if echo "${CHANGED}" | grep -qE '\.ts$|^package(-lock)?\.json$|^tsconfig\.json$|^biome\.json$|^\.github/workflows/ci\.yml$'; then
            add_check '{"name":"Lint","check":"lint","runner":"ubuntu-24.04"}'
            add_check '{"name":"Test","check":"test","runner":"ubuntu-24.04"}'
            RUN_CODECOV=true
          fi

          # Site changes: format check + build
          if echo "${CHANGED}" | grep -qE '^site/'; then
            add_check '{"name":"Site","check":"site","runner":"ubuntu-slim"}'
          fi

          # Trigger Worker changes: typecheck + deploy dry-run
          if echo "${CHANGED}" | grep -qE '^trigger/'; then
            add_check '{"name":"Trigger","check":"trigger","runner":"ubuntu-slim"}'
          fi

          # Source changes: CodeQL
          if echo "${CHANGED}" | grep -qE '^src/|^site/|^trigger/'; then
            RUN_CODEQL=true
          fi

          # Workflow changes: Actions security audit
          if echo "${CHANGED}" | grep -qE '^\.github/workflows/'; then
            RUN_ZIZMOR=true
          fi

          {
            echo "matrix=${MATRIX}"
            echo "run_codeql=${RUN_CODEQL}"
            echo "run_codecov=${RUN_CODECOV}"
            echo "run_zizmor=${RUN_ZIZMOR}"
          } >> "${GITHUB_OUTPUT}"

  commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read # required to read PR titles
    uses: starhaven-io/.github/.github/workflows/reusable-conventional-commits.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1

  check:
    name: ${{ matrix.name }}
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ matrix.fetch_depth || 1 }}
          persist-credentials: false


      - name: Setup Node
        if: matrix.check == 'lint' || matrix.check == 'test'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: npm

      - name: Check npm install-script policy
        if: matrix.check == 'lint' || matrix.check == 'test'
        run: node scripts/check-npm-install-policy.mjs . site trigger

      - name: Install dependencies
        if: matrix.check == 'lint' || matrix.check == 'test'
        # Fail if an unreviewed dependency install script is introduced.
        run: npm ci --strict-allow-scripts


      - name: Typecheck
        if: matrix.check == 'lint'
        run: npm run typecheck

      - name: Biome
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Restore typos cache
        id: typos-cache
        if: matrix.check == 'lint'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/typos
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-typos-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-typos-

      - name: Install typos
        if: matrix.check == 'lint'
        run: cargo install typos-cli --locked --version 1.48.0

      - name: Typos
        if: matrix.check == 'lint'
        run: typos

      - name: Save typos cache
        if: matrix.check == 'lint' && github.event_name == 'push' && steps.typos-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/typos
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-${{ runner.arch }}-typos-${{ hashFiles('.github/workflows/ci.yml') }}


      - name: Test
        if: matrix.check == 'test'
        run: npm run test:coverage

      - name: Save coverage report
        if: success() && matrix.check == 'test'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 1


      - name: Setup Node (site)
        if: matrix.check == 'site'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26

      - name: Check npm install-script policy (site)
        if: matrix.check == 'site'
        run: node scripts/check-npm-install-policy.mjs . site trigger

      - name: Install site dependencies
        if: matrix.check == 'site'
        working-directory: site
        # Fail if an unreviewed dependency install script is introduced.
        run: npm ci --strict-allow-scripts

      - name: Check formatting
        if: matrix.check == 'site'
        working-directory: site
        run: npm run format:check

      - name: Build site
        if: matrix.check == 'site'
        working-directory: site
        run: npm run build

      - name: Deploy dry-run
        if: matrix.check == 'site'
        working-directory: site
        run: npm run deploy:dry
        env:
          WRANGLER_SEND_METRICS: "false"


      - name: Setup Node (trigger)
        if: matrix.check == 'trigger'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26

      - name: Check npm install-script policy (trigger)
        if: matrix.check == 'trigger'
        run: node scripts/check-npm-install-policy.mjs . site trigger

      - name: Install trigger dependencies
        if: matrix.check == 'trigger'
        working-directory: trigger
        # Fail if an unreviewed dependency install script is introduced.
        run: npm ci --strict-allow-scripts

      - name: Typecheck trigger
        if: matrix.check == 'trigger'
        working-directory: trigger
        run: npm run typecheck

      - name: Deploy trigger dry-run
        if: matrix.check == 'trigger'
        working-directory: trigger
        run: npm run deploy:dry
        env:
          WRANGLER_SEND_METRICS: "false"


  codeql:
    name: CodeQL
    needs: generate-matrix
    if: needs.generate-matrix.outputs.run_codeql == 'true'
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1
    with:
      languages: '["javascript-typescript"]'
      runner: "ubuntu-24.04"
      timeout-minutes: 30
      build-mode: ""
      build-profile: ""

  codecov:
    name: Codecov
    needs: [generate-matrix, check]
    if: ${{ !cancelled() && needs.generate-matrix.outputs.run_codecov == 'true' }}
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for Codecov OIDC authentication
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage report
        id: download-coverage
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        if: steps.download-coverage.outcome == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: coverage/lcov.info
          fail_ci_if_error: false

  zizmor:
    name: zizmor
    needs: generate-matrix
    if: needs.generate-matrix.outputs.run_zizmor == 'true'
    permissions:
      contents: read
      security-events: write # required for zizmor SARIF upload
    uses: starhaven-io/.github/.github/workflows/reusable-zizmor.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1

  conclusion:
    name: conclusion
    needs: [commits, check, codeql, codecov, zizmor]
    runs-on: ubuntu-slim
    timeout-minutes: 15
    if: always()
    steps:
      - name: Result
        env:
          COMMITS_RESULT: ${{ needs.commits.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          CODECOV_RESULT: ${{ needs.codecov.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
        run: |
          test "${COMMITS_RESULT}" = "success" || test "${COMMITS_RESULT}" = "skipped"
          test "${CHECK_RESULT}" = "success" || test "${CHECK_RESULT}" = "skipped"
          test "${CODEQL_RESULT}" = "success" || test "${CODEQL_RESULT}" = "skipped"
          test "${CODECOV_RESULT}" = "success" || test "${CODECOV_RESULT}" = "skipped"
          test "${ZIZMOR_RESULT}" = "success" || test "${ZIZMOR_RESULT}" = "skipped"
