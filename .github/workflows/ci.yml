name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CI matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push to main: run lint + test to warm caches and guard the branch.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            echo 'matrix=[{"name":"Lint","check":"lint","runner":"ubuntu-latest"},{"name":"Test","check":"test","runner":"ubuntu-latest"}]' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MATRIX='[{"name":"Conventional Commits","check":"commits","runner":"ubuntu-slim","fetch_depth":"0"}'

          # For title/body edits, only recheck conventional commits
          if [[ "${EVENT_ACTION}" == "edited" ]]; then
            echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")

          # Crawler / tooling changes: lint + test
          if echo "${CHANGED}" | grep -qE '\.ts$|^package(-lock)?\.json$|^tsconfig\.json$|^biome\.json$|^\.github/workflows/ci\.yml$'; then
            MATRIX+=',{"name":"Lint","check":"lint","runner":"ubuntu-latest"}'
            MATRIX+=',{"name":"Test","check":"test","runner":"ubuntu-latest"}'
          fi

          # Site changes: format check + build
          if echo "${CHANGED}" | grep -qE '^site/'; then
            MATRIX+=',{"name":"Site","check":"site","runner":"ubuntu-slim"}'
          fi

          # Trigger Worker changes: typecheck
          if echo "${CHANGED}" | grep -qE '^trigger/'; then
            MATRIX+=',{"name":"Trigger","check":"trigger","runner":"ubuntu-slim"}'
          fi

          # Workflow changes: Actions security audit
          if echo "${CHANGED}" | grep -qE '^\.github/workflows/'; then
            MATRIX+=',{"name":"zizmor","check":"zizmor","runner":"ubuntu-latest"}'
          fi

          echo "matrix=${MATRIX}]" >> "${GITHUB_OUTPUT}"

  check:
    name: ${{ matrix.name }}
    needs: generate-matrix
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      pull-requests: read # required to fetch PR commits for conventional commit validation
      security-events: write # required for zizmor SARIF upload
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: ${{ matrix.fetch_depth || 1 }}
          persist-credentials: false

      # --- Conventional Commits ---

      - name: Check PR title
        if: matrix.check == 'commits'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          if [[ ! "${PR_TITLE}" =~ ${PATTERN} ]]; then
            echo "::error::PR title '${PR_TITLE}' does not follow Conventional Commits."
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            exit 1
          fi

      - name: Check commit messages
        if: matrix.check == 'commits'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r LINE; do
            SHA="${LINE%% *}"
            MSG="${LINE#* }"
            if [[ "${MSG}" == Merge\ * ]]; then
              continue
            fi
            if [[ ! "${MSG}" =~ ${PATTERN} ]]; then
              echo "::error::Commit ${SHA} does not follow Conventional Commits: '${MSG}'"
              FAILED=1
            fi
          done < <(git log --format="%h %s" "${BASE_SHA}..${HEAD_SHA}")
          if [[ "${FAILED}" -eq 1 ]]; then
            echo "All commit messages must follow: <type>(<scope>): <description>"
            exit 1
          fi

      # --- Node setup (lint / test / site) ---

      - name: Setup Node
        if: matrix.check == 'lint' || matrix.check == 'test'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        if: matrix.check == 'lint' || matrix.check == 'test'
        run: npm ci

      # --- Lint ---

      - name: Typecheck
        if: matrix.check == 'lint'
        run: npm run typecheck

      - name: Biome
        if: matrix.check == 'lint'
        run: npm run lint

      - name: Restore typos cache
        id: typos-cache
        if: matrix.check == 'lint'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/typos
          key: ${{ runner.os }}-${{ runner.arch }}-typos-1.46.3

      - name: Install typos
        if: matrix.check == 'lint' && steps.typos-cache.outputs.cache-hit != 'true'
        run: cargo install typos-cli --locked --version 1.46.3

      - name: Typos
        if: matrix.check == 'lint'
        run: typos

      - name: Save typos cache
        if: matrix.check == 'lint' && github.event_name == 'push' && steps.typos-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/typos
          key: ${{ runner.os }}-${{ runner.arch }}-typos-1.46.3

      # --- Test ---

      - name: Test
        if: matrix.check == 'test'
        run: npm test

      # --- Site ---

      - name: Setup Node (site)
        if: matrix.check == 'site'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install site dependencies
        if: matrix.check == 'site'
        working-directory: site
        run: npm ci

      - name: Check formatting
        if: matrix.check == 'site'
        working-directory: site
        run: npm run format:check

      - name: Build site
        if: matrix.check == 'site'
        working-directory: site
        run: npm run build

      # --- Trigger ---

      - name: Setup Node (trigger)
        if: matrix.check == 'trigger'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install trigger dependencies
        if: matrix.check == 'trigger'
        working-directory: trigger
        run: npm ci

      - name: Typecheck trigger
        if: matrix.check == 'trigger'
        working-directory: trigger
        run: npm run typecheck

      # --- zizmor ---

      - name: Run zizmor
        if: matrix.check == 'zizmor'
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          persona: auditor

  conclusion:
    name: conclusion
    needs: check
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Result
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: test "${CHECK_RESULT}" = "success"
