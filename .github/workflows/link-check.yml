name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-link-check.yml@7ffa044d5dadee7a17c504bd18bedc48057bf224 # v2026.07.05.2
    with:
      args: "--config lychee.toml README.md trigger/README.md"
      build-site: true
      site-directory: "site"
      authenticated-github: false
