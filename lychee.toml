# Configuration for https://github.com/lycheeverse/lychee
# Checks documentation links. `pkgstory/site` is SSR-backed and does not emit
# static HTML pages under `site/dist/client/`; build/deploy checks cover the site.
# Run: `just lychee` (requires `just site-build` first).

max_concurrency = 20
timeout = 20
max_retries = 3

# claude.ai returns 403 to automated link checkers
exclude = ["https://claude.ai/.*"]
